site_name: nanopublishing
site_description: Skills and examples for building nanopublications from Markdown-LD.
repo_url: https://github.com/iolanta-tech/nanopublishing
repo_name: iolanta-tech/nanopublishing
edit_uri: edit/main/docs/

docs_dir: docs

hooks:
  - hooks.py

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path:
        - docs
      check_paths: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

plugins:
  - search
  - awesome-pages

theme:
  name: material
  custom_dir: overrides
  palette:
    scheme: slate
    primary: blue grey
    accent: amber
  features:
    - navigation.sections
    - navigation.indexes
    - navigation.tabs
    - navigation.tabs.sticky
    - content.code.copy
    - content.action.edit

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/iolanta-tech/nanopublishing
